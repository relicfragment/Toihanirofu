<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>profile</title>
  <style>
body {
  margin: 0;
  background-color: #000;
  color: #ccc;
  font-family: "Courier New", Courier, monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  padding-top: 18vh; /* ← デスクトップ用の余白 */
  padding-bottom: 40px;
  box-sizing: border-box;
}

img {
  width: 30%;
  max-width: 600px;
  height: auto;
  margin-bottom: 40px;
}

/* 👇 スマホだけ余白をさらに小さくして上寄せに */
@media (max-width: 768px) {
  body {
    padding-top: 19vh; /* スマホ用に、上にグッと寄せる */
  }

  img {
    width: 80%;
    max-width: none;
  }
}
    p {
      font-size: 10px;
      line-height: 1.4;
      text-align: center;
      margin: 0;
    }
  </style>
</head>
<body>
  <img src="images/profile2026.png" alt="profile2026.png">
  <p>トイハニロフ</p>
  <p>作詞作曲、歌、ミックス、マスタリング、イラスト、動画など全てを一人で製作している。</p>
  <p>snsはInstagramのみ</p>
</body>
</html>
